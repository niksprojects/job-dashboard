name: Scrape Jobs (Apify + JSearch)

on:
  workflow_dispatch:
    inputs:
      scrapers:
        description: "Which scrapers to run"
        required: true
        default: "Both"
        type: choice
        options:
          - Both
          - Apify Only
          - JSearch Only

  # Mon/Wed/Fri at 6am ET (10:00 UTC)
  schedule:
    - cron: "0 10 * * 1,3,5"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run Apify LinkedIn scrape
        if: ${{ github.event.inputs.scrapers != 'JSearch Only' }}
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          echo "=== Apify LinkedIn Scrape ==="
          python3 scripts/scrape.py --all --count 100 || echo "::warning::Apify scrape failed"

      - name: Import Apify results to Supabase
        if: ${{ github.event.inputs.scrapers != 'JSearch Only' }}
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="/tmp/linkedin-jobs-$(date +%Y-%m-%d).json"
          if [ -f "$FILE" ]; then
            echo "=== Importing Apify results ==="
            node scripts/scrape-jobs.mjs --input "$FILE"
          else
            echo "::warning::No Apify output file found at $FILE"
          fi

      - name: Run JSearch scrape
        if: ${{ github.event.inputs.scrapers != 'Apify Only' }}
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          echo "=== JSearch Scrape ==="
          node scripts/scrape-jsearch.mjs || echo "::warning::JSearch scrape failed"

      - name: Import JSearch results to Supabase
        if: ${{ github.event.inputs.scrapers != 'Apify Only' }}
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="/tmp/jsearch-jobs-$(date +%Y-%m-%d).json"
          if [ -f "$FILE" ]; then
            echo "=== Importing JSearch results ==="
            node scripts/scrape-jobs.mjs --input "$FILE"
          else
            echo "::warning::No JSearch output file found at $FILE"
          fi
