name: Refresh Job Listings

on:
  # Manual trigger with inputs — gives you a button + dropdown in GitHub UI
  workflow_dispatch:
    inputs:
      location:
        description: "Location to scrape"
        required: true
        default: "All Locations"
        type: choice
        options:
          - All Locations
          - United States
          - New York, NY
          - Maryland
          - Canada
      keywords:
        description: "Job role to scrape"
        required: true
        default: "All Roles"
        type: choice
        options:
          - All Roles
          - Project Manager
          - Scrum Master
      count:
        description: "Max jobs per location"
        required: false
        default: "200"

  # Auto-refresh every Monday at 2am ET (06:00 UTC) — off-peak to avoid GitHub runner delays
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scrape
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          LOCATION="${{ github.event.inputs.location || 'All Locations' }}"
          ROLE="${{ github.event.inputs.keywords || 'All Roles' }}"
          COUNT="${{ github.event.inputs.count || '100' }}"

          run_scrape() {
            KEYWORDS="$1"
            if [ "$LOCATION" = "All Locations" ]; then
              python3 scripts/scrape.py --all --keywords "$KEYWORDS" --count "$COUNT"
            else
              python3 scripts/scrape.py --location "$LOCATION" --keywords "$KEYWORDS" --count "$COUNT"
            fi
          }

          if [ "$ROLE" = "All Roles" ]; then
            run_scrape "Project Manager"
            run_scrape "Scrum Master"
          else
            run_scrape "$ROLE"
          fi

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.csv
          git diff --staged --quiet && echo "No changes to commit" || (
            LOCATION="${{ github.event.inputs.location || 'All Locations (scheduled)' }}"
            ROLE="${{ github.event.inputs.keywords || 'All Roles (scheduled)' }}"
            git commit -m "Update job listings — $ROLE · $LOCATION $(date +'%Y-%m-%d')"
            git push
          )
